<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Target Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    padding:30px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{text-align:center;margin-bottom:20px;}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    flex:1;
    padding:15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    background:#ddd;
}

.tab-btn.active{
    background:#007bff;
    color:white;
}

.item{
    display:flex;
    align-items:center;
    gap:15px;
    margin:15px 0;
    font-size:22px;
}

input[type="checkbox"]{
    width:25px;
    height:25px;
}

.summary{
    margin-top:20px;
    background:#eef4ff;
    border-radius:10px;
    padding:20px;
}

.summary p{
    margin:10px 0;
    font-size:20px;
    font-weight:bold;
}

.completed{color:green;}
.remaining{color:#d9534f;}

input[type="number"]{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:18px;
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.clear-btn{
    background:#d9534f;
}

.footer{
    margin-top:15px;
    text-align:center;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<h1>Daily Target Tracker</h1>

<div class="tabs">
    <button id="weekdayBtn" class="tab-btn active" onclick="showTab('weekday')">Weekday</button>
    <button id="saturdayBtn" class="tab-btn" onclick="showTab('saturday')">Saturday</button>
    <button id="sundayBtn" class="tab-btn" onclick="showTab('sunday')">Sunday</button>
</div>

<!-- EXTRAS -->
<div class="summary">
    <p>Extras Bank Balance: KSh <span id="extrasBalance">0</span></p>
    <p>Total Extras Earned: KSh <span id="extrasTotal">0</span></p>

    <input type="number" id="extraInput" placeholder="Enter Extra Earnings">
    <button onclick="addExtra()">Add Extra</button>
</div>

<!-- WEEKDAY -->
<div id="weekday">

    <div class="item"><input type="checkbox" id="fuel"><label>Fuel - KSh 200</label></div>
    <div class="item"><input type="checkbox" id="savings"><label>Savings - KSh 200</label></div>
    <div class="item"><input type="checkbox" id="service"><label>Service - KSh 400</label></div>

</div>

<!-- SATURDAY -->
<div id="saturday" style="display:none;">

    <div class="item"><input type="checkbox" id="satFuel" onchange="processWeekendItem('satFuel',200)"><label>Fuel - KSh 200</label></div>
    <div class="item"><input type="checkbox" id="satService" onchange="processWeekendItem('satService',400)"><label>Service - KSh 400</label></div>
    <div class="item"><input type="checkbox" id="satLoan" onchange="processWeekendItem('satLoan',450)"><label>Loan - KSh 450</label></div>
    <div class="item"><input type="checkbox" id="satStock" onchange="processWeekendItem('satStock',500)"><label>Stock - KSh 500</label></div>

</div>

<!-- SUNDAY -->
<div id="sunday" style="display:none;">

    <div class="item"><input type="checkbox" id="sunFuel" onchange="processWeekendItem('sunFuel',200)"><label>Fuel - KSh 200</label></div>
    <div class="item"><input type="checkbox" id="sunService" onchange="processWeekendItem('sunService',400)"><label>Service - KSh 400</label></div>
    <div class="item"><input type="checkbox" id="sunLoan" onchange="processWeekendItem('sunLoan',450)"><label>Loan - KSh 450</label></div>
    <div class="item"><input type="checkbox" id="sunStock" onchange="processWeekendItem('sunStock',500)"><label>Stock - KSh 500</label></div>

</div>

<!-- SUMMARY -->
<div class="summary">
    <p>Target: KSh <span id="target">0</span></p>
    <p class="completed">Completed: KSh <span id="completed">0</span></p>
    <p class="remaining">Remaining: KSh <span id="remaining">0</span></p>
    <p>Progress: <span id="progress">0%</span></p>
</div>

<button class="clear-btn" onclick="clearData()">Clear Saved Data</button>

<div class="footer">
Weekend items automatically deduct from Extras Bank.
</div>

</div>

<script>

const weekdayExpenses={fuel:200,savings:200,service:400};
const saturdayExpenses={satFuel:200,satService:400,satLoan:450,satStock:500};
const sundayExpenses={sunFuel:200,sunService:400,sunLoan:450,sunStock:500};

let currentTab="weekday";

function showTab(tab){
    currentTab=tab;

    document.getElementById("weekday").style.display=tab==="weekday"?"block":"none";
    document.getElementById("saturday").style.display=tab==="saturday"?"block":"none";
    document.getElementById("sunday").style.display=tab==="sunday"?"block":"none";

    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.getElementById(tab+"Btn").classList.add("active");

    updateTotals();
}

function updateExtrasDisplay(){
    document.getElementById("extrasBalance").textContent =
        localStorage.getItem("extrasBank")||0;

    document.getElementById("extrasTotal").textContent =
        localStorage.getItem("extrasTotal")||0;
}

function addExtra(){
    let amount=parseFloat(document.getElementById("extraInput").value)||0;
    if(amount<=0) return;

    let balance=parseFloat(localStorage.getItem("extrasBank")||0);
    let total=parseFloat(localStorage.getItem("extrasTotal")||0);

    balance+=amount;
    total+=amount;

    localStorage.setItem("extrasBank",balance);
    localStorage.setItem("extrasTotal",total);

    document.getElementById("extraInput").value="";
    updateExtrasDisplay();
}

function processWeekendItem(id,amount){

    const box=document.getElementById(id);

    if(localStorage.getItem(id)==="true"){
        box.checked=true;
        alert("Already completed. Cannot undo.");
        return;
    }

    if(!box.checked) return;

    let extras=parseFloat(localStorage.getItem("extrasBank")||0);

    if(extras>=amount){

        extras-=amount;
        localStorage.setItem("extrasBank",extras);
        localStorage.setItem(id,"true");

        updateExtrasDisplay();
        updateTotals();

        alert(`KSh ${amount} deducted. Remaining: KSh ${extras}`);

    }else{
        box.checked=false;
        alert("Insufficient Extras Balance!");
    }
}

function updateTotals(){

    let expenses=currentTab==="weekday"?weekdayExpenses:
                currentTab==="saturday"?saturdayExpenses:
                sundayExpenses;

    let target=0,completed=0;

    for(let key in expenses){
        target+=expenses[key];
        const box=document.getElementById(key);
        if(box && box.checked) completed+=expenses[key];
    }

    document.getElementById("target").textContent=target;
    document.getElementById("completed").textContent=completed;
    document.getElementById("remaining").textContent=target-completed;
    document.getElementById("progress").textContent =
        target?Math.round((completed/target)*100):0 + "%";
}

function clearData(){
    if(!confirm("Clear all data?")) return;

    localStorage.clear();

    document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);

    updateExtrasDisplay();
    updateTotals();

    alert("Data cleared");
}

window.onload=function(){

    if(!localStorage.getItem("extrasBank"))
        localStorage.setItem("extrasBank","0");

    if(!localStorage.getItem("extrasTotal"))
        localStorage.setItem("extrasTotal","0");

    updateExtrasDisplay();

    document.querySelectorAll("input[type=checkbox]").forEach(box=>{

        if(localStorage.getItem(box.id)==="true"){
            box.checked=true;
        }

        box.addEventListener("click",function(e){

            if(this.checked &&
               localStorage.getItem(this.id)==="true"){
                e.preventDefault();
                return false;
            }

            updateTotals();
        });
    });

    showTab("weekday");
};

</script>

</body>
</html>
