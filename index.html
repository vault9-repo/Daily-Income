<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Target Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    padding:30px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{text-align:center;margin-bottom:20px;}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    flex:1;
    padding:15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    color:white;
    background:linear-gradient(135deg,#8B5A2B,#000);
}

.tab-btn.active{
    background:linear-gradient(135deg,#A0522D,#000);
    color:white;
}

.item{
    display:flex;
    align-items:center;
    gap:15px;
    margin:15px 0;
    font-size:22px;
}

input[type="checkbox"]{
    width:25px;
    height:25px;
    accent-color:#6B4423;
}

.summary{
    margin-top:20px;
    background:#eef4ff;
    border-radius:10px;
    padding:20px;
}

.summary p{
    margin:10px 0;
    font-size:20px;
    font-weight:bold;
}

/* ENLARGED EXTRA EARNINGS INPUT */
#extraInput{
    width:100%;
    padding:16px;
    margin-top:12px;
    font-size:20px;
    border-radius:10px;
    border:2px solid #8B5A2B;
    outline:none;
    transition:0.2s;
}

#extraInput:focus{
    border-color:#6B4423;
    box-shadow:0 0 8px rgba(107,68,35,0.4);
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:6px;
    background:linear-gradient(135deg,#8B5A2B,#000);
    color:white;
    font-size:18px;
    cursor:pointer;
}

.clear-btn{
    background:linear-gradient(135deg,#ff4d4d,#b30000);
    color:white;
}

.footer{
    margin-top:15px;
    text-align:center;
    color:#666;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#fff;
    padding:20px;
    border-radius:10px;
    width:300px;
}

.modal-content input{
    width:100%;
    padding:10px;
    margin-top:10px;
    font-size:16px;
    border:2px solid #8B5A2B;
    border-radius:6px;
}

.item label{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    font-size:18px;
}

/* STATUS COLORS */
.status-not{ color:#999; }
.status-wait{ color:#d97706; font-weight:bold; }
.status-done{ color:#16a34a; font-weight:bold; }

/* SPINNER */
.spinner{
    display:inline-block;
    width:14px;
    height:14px;
    border:2px solid rgba(255,255,255,0.3);
    border-top:2px solid #8B5A2B;
    border-radius:50%;
    animation:spin 0.6s linear infinite;
    margin-right:6px;
}

.add-btn{
    cursor:pointer;
    user-select:none;
    font-size:18px;
    color:white;
    background:linear-gradient(135deg,#8B5A2B,#000);
    padding:8px 12px;
    border-radius:20px;
    display:inline-block;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.add-btn{
    cursor:pointer;
    user-select:none;
    font-size:18px;
    color:#007bff;
}
</style>
</head>

<body>

<div class="container">

<h1>Daily Target Tracker</h1>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('weekday')" id="weekdayBtn">Weekday</button>
    <button class="tab-btn" onclick="showTab('saturday')" id="saturdayBtn">Saturday</button>
    <button class="tab-btn" onclick="showTab('sunday')" id="sundayBtn">Sunday</button>
</div>

<div class="summary">
    <p>Extras Bank: KSh <span id="extrasBank">0</span></p>

    <p>Saturday Remaining Total: KSh <span id="satTotal">0</span></p>
    <p>Sunday Remaining Total: KSh <span id="sunTotal">0</span></p>

    <input type="number" id="extraInput" placeholder="Add Extra Earnings">
    <button onclick="addExtra()">Add Extra</button>
</div>

<!-- WEEKDAY -->
<div id="weekday">
    <div class="item"><input type="checkbox" id="fuel"><label>Fuel - KSh 200</label></div>
    <div class="item"><input type="checkbox" id="savings"><label>Savings - KSh 200</label></div>
    <div class="item"><input type="checkbox" id="service"><label>Service - KSh 400</label></div>
</div>

<!-- SATURDAY -->
<div id="saturday" style="display:none;">

    <div class="item">
        <input type="checkbox" id="satFuel" style="display:none" onchange="processWeekendItem('satFuel',200)">
        <span class="add-btn" onclick="spinnerAdd(this,'satFuel',200)">➕ Add</span>
        <label>Fuel - KSh 200</label>
    </div>

    <div class="item">
        <input type="checkbox" id="satService" style="display:none" onchange="processWeekendItem('satService',400)">
        <span class="add-btn" onclick="spinnerAdd(this,'satService',400)">➕ Add</span>
        <label>Service - KSh 400</label>
    </div>

    <div class="item">
        <input type="checkbox" id="satLoan" style="display:none" onchange="processWeekendItem('satLoan',450)">
        <span class="add-btn" onclick="spinnerAdd(this,'satLoan',450)">➕ Add</span>
        <label>Loan - KSh 450</label>
    </div>

    <div class="item">
        <input type="checkbox" id="satStock" style="display:none" onchange="processWeekendItem('satStock',500)">
        <span class="add-btn" onclick="spinnerAdd(this,'satStock',500)">➕ Add</span>
        <label>Stock - KSh 500</label>
    </div>

</div>

<!-- SUNDAY -->
<div id="sunday" style="display:none;">

    <div class="item">
        <input type="checkbox" id="sunFuel" style="display:none" onchange="processWeekendItem('sunFuel',200)">
        <span class="add-btn" onclick="spinnerAdd(this,'sunFuel',200)">➕ Add</span>
        <label>Fuel - KSh 200</label>
    </div>

    <div class="item">
        <input type="checkbox" id="sunService" style="display:none" onchange="processWeekendItem('sunService',400)">
        <span class="add-btn" onclick="spinnerAdd(this,'sunService',400)">➕ Add</span>
        <label>Service - KSh 400</label>
    </div>

    <div class="item">
        <input type="checkbox" id="sunLoan" style="display:none" onchange="processWeekendItem('sunLoan',450)">
        <span class="add-btn" onclick="spinnerAdd(this,'sunLoan',450)">➕ Add</span>
        <label>Loan - KSh 450</label>
    </div>

    <div class="item">
        <input type="checkbox" id="sunStock" style="display:none" onchange="processWeekendItem('sunStock',500)">
        <span class="add-btn" onclick="spinnerAdd(this,'sunStock',500)">➕ Add</span>
        <label>Stock - KSh 500</label>
    </div>

</div>

<div class="summary">
    <p class="remaining">Track your finances accurately</p>
</div>

<button class="clear-btn" onclick="clearData()">Clear Data</button>

<div class="footer">
Weekend items deduct from Extras Bank with live updates.
</div>

</div>

<!-- MODAL -->
<div id="deductModal" class="modal">
  <div class="modal-content">
    <h3>Deduct Amount</h3>
    <p id="modalInfo"></p>
    <input type="number" id="deductInput" placeholder="Enter amount">
    <button onclick="applyDeduction()">Deduct</button>
    <button onclick="closeModal()" style="background:#999;">Cancel</button>
  </div>
</div>

<script>

let currentItem = null;

const baseAmounts = {
    satFuel:200, satService:400, satLoan:450, satStock:500,
    sunFuel:200, sunService:400, sunLoan:450, sunStock:500
};

function spinnerAdd(el, id, amount){
    const original = el.innerHTML;
    el.innerHTML = `<span class="spinner"></span> Adding`;

    setTimeout(()=>{
        el.innerHTML = original;

        const box = document.getElementById(id);
        box.checked = true;

        saveCheck(id, true);
        box.dispatchEvent(new Event("change"));

        processWeekendItem(id, amount);
    }, 500);
}

function getStatus(id, base){
    let remaining = parseFloat(localStorage.getItem(id));
    let box = document.getElementById(id);

    if(!box) return "not";

    if(isNaN(remaining)){
        return box.checked ? "wait" : "not";
    }

    if(remaining <= 0) return "done";

    let spent = base - remaining;

    if(spent > 0) return "wait";

    return "not";
}

function showTab(tab){
    document.getElementById("weekday").style.display = tab==="weekday"?"block":"none";
    document.getElementById("saturday").style.display = tab==="saturday"?"block":"none";
    document.getElementById("sunday").style.display = tab==="sunday"?"block":"none";

    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.getElementById(tab+"Btn").classList.add("active");
}

function saveCheck(id, checked){
    localStorage.setItem("chk_" + id, checked);
}

function restoreChecks(){
    document.querySelectorAll("input[type='checkbox']").forEach(cb=>{
        let saved = localStorage.getItem("chk_" + cb.id);
        if(saved !== null){
            cb.checked = (saved === "true");
        }

        cb.addEventListener("change", function(){
            saveCheck(cb.id, cb.checked);
        });
    });
}

function updateWeekendTotals(){
    let satTotal = 0;
    let sunTotal = 0;

    Object.keys(baseAmounts).forEach(id=>{
        let remaining = parseFloat(localStorage.getItem(id));
        if(isNaN(remaining)) remaining = baseAmounts[id];

        if(id.startsWith("sat")) satTotal += remaining;
        if(id.startsWith("sun")) sunTotal += remaining;
    });

    document.getElementById("satTotal").textContent = satTotal;
    document.getElementById("sunTotal").textContent = sunTotal;
}

/* ONLY CHANGE: WEEKEND LABEL ALIGNMENT FIX */
function updateLabel(id, baseAmount){

    let remaining = parseFloat(localStorage.getItem(id));
    if(isNaN(remaining)) remaining = baseAmount;

    let spent = baseAmount - remaining;

    const label = document.getElementById(id).parentElement.querySelector("label");
    if(!label) return;

    let name = label.innerText.split("•")[0].split("-")[0].trim();

    let status = getStatus(id, baseAmount);

    let icon = "⚪";
    let cls = "status-not";

    if(status==="wait"){ icon="⏳"; cls="status-wait"; }
    if(status==="done"){ icon="✅"; cls="status-done"; }

    label.innerHTML = `
        <span class="${cls}" style="display:inline-block; min-width:160px;">
            ${icon} ${name}
        </span>
        • KSh ${baseAmount}
        • Spent ${spent}
        • Rem ${remaining}
    `;
}

function addExtra(){
    let val = parseFloat(document.getElementById("extraInput").value)||0;
    if(val<=0) return;

    let bank = parseFloat(localStorage.getItem("extrasBank")||0);
    bank += val;

    localStorage.setItem("extrasBank",bank);
    document.getElementById("extraInput").value="";

    updateBank();
}

function updateBank(){
    document.getElementById("extrasBank").textContent =
        localStorage.getItem("extrasBank")||0;

    updateWeekendTotals();
}

function processWeekendItem(id, amount){

    const box = document.getElementById(id);
    if(!box.checked) return;

    currentItem = id;

    let remaining = parseFloat(localStorage.getItem(id));
    if(isNaN(remaining)) remaining = amount;

    document.getElementById("modalInfo").innerText =
        "Rem: KSh " + remaining;

    document.getElementById("deductModal").style.display = "flex";
}

function applyDeduction(){

    let amount = parseFloat(document.getElementById("deductInput").value);
    if(!amount || amount <= 0) return;

    let bank = parseFloat(localStorage.getItem("extrasBank")||0);

    let remaining = parseFloat(localStorage.getItem(currentItem));
    if(isNaN(remaining)) remaining = baseAmounts[currentItem];

    if(amount > bank){
        alert("Not enough Extras Bank");
        return;
    }

    if(amount > remaining){
        alert("Cannot exceed remaining balance");
        return;
    }

    let newRemaining = remaining - amount;
    let newBank = bank - amount;

    localStorage.setItem("extrasBank", newBank);
    localStorage.setItem(currentItem, newRemaining);

    updateLabel(currentItem, baseAmounts[currentItem]);
    updateBank();
    updateWeekendTotals();
    closeModal();

    alert(`Deducted KSh ${amount} | Rem: KSh ${newRemaining}`);
}

function closeModal(){
    document.getElementById("deductModal").style.display="none";
}

function clearData(){
    if(!confirm("Are you sure you want to clear all data?")) return;
    localStorage.clear();
    location.reload();
}

window.onload=function(){
    updateBank();
    showTab("weekday");
    restoreChecks();

    Object.keys(baseAmounts).forEach(id=>{
        updateLabel(id, baseAmounts[id]);
    });

    updateWeekendTotals();
};

</script>

</body>
</html>
